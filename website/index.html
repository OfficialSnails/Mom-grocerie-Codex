<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bons spéciaux | Liste d'épicerie</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ctext y='50' font-size='48'%3E%E2%9C%85%3C/text%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#items">Aller aux produits</a>
    <header class="topbar">
      <div class="topbar-title">
        <p class="eyebrow">Québec</p>
        <h1>Liste d'épicerie</h1>
        <details id="method-note" class="method-note">
          <summary>Comment lire la liste</summary>
          <div id="method-note-body" class="method-note-body" aria-live="polite"></div>
        </details>
      </div>
    </header>

    <main class="layout">
      <section class="control-panel" aria-label="Filtres d'épicerie">
        <div class="control-field week-field">
          <span class="control-label">Semaine</span>
          <button id="week-toggle" class="week-toggle" type="button" aria-expanded="false" aria-haspopup="listbox">
            <span id="week-label">Choisir une semaine</span>
            <span aria-hidden="true">⌄</span>
          </button>
          <div id="week-options" class="week-options" role="listbox" hidden></div>
        </div>
        <div class="control-field search-panel">
          <label for="item-search">Rechercher un produit</label>
          <input id="item-search" name="item-search" type="search" autocomplete="off" placeholder="Ex. poulet, beurre, fraises…" />
        </div>
        <div class="control-field mode-field">
          <span class="control-label">Afficher</span>
          <div id="mode-tabs" class="mode-tabs" role="tablist" aria-label="Mode d'affichage">
            <button type="button" class="active" data-mode="deals" role="tab" aria-selected="true">Bons prix</button>
            <button type="button" data-mode="all" role="tab" aria-selected="false">Tous les produits</button>
          </div>
        </div>
        <div class="control-field store-panel">
          <div class="store-panel-head">
            <span class="control-label">Épiceries</span>
            <div class="store-actions" aria-label="Raccourcis d'épiceries">
              <button id="regular-stores-button" type="button">Épiceries régulières</button>
              <button id="all-stores-button" type="button">Tout inclure</button>
              <button id="clear-stores-button" type="button">Tout décocher</button>
            </div>
          </div>
          <div id="store-filter" class="store-filter" role="group" aria-label="Choisir les épiceries"></div>
        </div>
        <div class="control-field rayon-field">
          <span class="control-label">Rayons</span>
          <nav id="category-tabs" class="category-tabs" aria-label="Rayons"></nav>
        </div>
      </section>

      <section class="shopper">
        <div id="week-header" class="week-header"></div>
        <div id="items" class="items"></div>
      </section>

      <aside class="selection-panel" aria-label="Liste finale">
        <div class="panel-heading">
          <p class="eyebrow">Liste finale</p>
          <h2>À acheter</h2>
        </div>
        <div id="selection-summary" class="selection-summary"></div>
        <div id="selection-estimate" class="selection-estimate"></div>
        <div id="export-status" class="export-status" role="status" aria-live="polite"></div>
        <div id="selection-list" class="selection-list"></div>
        <div class="notes-field">
          <label for="list-notes">Notes</label>
          <textarea id="list-notes" rows="4" placeholder="Ex: vérifier les chandelles, shampoing, détergent…"></textarea>
        </div>
        <div class="basket-actions">
          <button id="print-button" class="button secondary" type="button">Exporter PDF</button>
          <button id="share-button" class="button share" type="button">Partager</button>
          <button id="clear-button" class="button ghost" type="button">Vider</button>
        </div>
      </aside>
    </main>

    <template id="empty-template">
      <div class="empty-state">
        <p>Aucun produit sélectionné.</p>
        <span>Coche des spéciaux pour bâtir la liste par épicerie.</span>
      </div>
    </template>

    <div id="image-preview" class="image-preview" hidden aria-hidden="true">
      <button class="image-preview-backdrop" type="button" data-preview-close="true" aria-label="Fermer l'aperçu"></button>
      <section class="image-preview-card" role="dialog" aria-modal="true" aria-labelledby="image-preview-title">
        <button id="image-preview-close" class="image-preview-close" type="button" aria-label="Fermer l'aperçu">×</button>
        <img id="image-preview-img" class="image-preview-img" src="" alt="" />
        <div class="image-preview-info">
          <h2 id="image-preview-title">Photo du prix</h2>
          <p id="image-preview-meta"></p>
        </div>
      </section>
    </div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
