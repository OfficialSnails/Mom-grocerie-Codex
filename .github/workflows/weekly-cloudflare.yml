name: Weekly grocery update

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Thursdays around 08:00 in Toronto during daylight saving time.
    - cron: "0 12 * * 4"

permissions:
  contents: write

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate weekly grocery data
        if: github.event_name != 'push'
        run: npm run weekly
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          BONS_SPECIAUX_IGNORE_RATE_LIMIT: "1"

      - name: Test
        run: npm test

      - name: Commit weekly output
        if: github.event_name != 'push'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update weekly grocery specials"
          file_pattern: "data reports website/data"

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy website --project-name bons-speciaux-joliette --branch main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
